train:
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 5000
  total_steps: 500000
  ema_decay: 0.9999
  grad_clip: 1.0
  mixed_precision: bf16
  log_every: 100
  save_every: 10000
  eval_every: 5000

data:
  data_dir: data/abides_small
  num_workers: 4
  pin_memory: true

seed: 42
output_dir: outputs/stage2
