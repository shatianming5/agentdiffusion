agent:
  raw_dim: 128
  latent_dim: 16

patch:
  patch_size: 4
  grid_h: 36
  grid_w: 36

model:
  d_model: 512
  depth: 12
  heads: 8
  mlp_ratio: 4.0
  market_cond_dim: 32
  dropout: 0.0

video:
  num_frames: 40
  num_cond_frames: 8

diffusion:
  timesteps: 1000
  beta_schedule: cosine
  prediction_type: v_prediction
  ddim_steps: 50

train:
  batch_size: 4
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 2000
  total_steps: 50000
  ema_decay: 0.9999
  grad_clip: 1.0
  mixed_precision: bf16
  log_every: 100
  save_every: 10000
  eval_every: 5000

data:
  data_dir: data/abides_video
  num_workers: 4
  pin_memory: true

seed: 42
output_dir: outputs/video_dit
