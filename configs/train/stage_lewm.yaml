train:
  batch_size: 16
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 2000
  total_steps: 50000
  ema_decay: 0.9999    # not used by lewm but kept for config compatibility
  grad_clip: 1.0
  mixed_precision: bf16
  log_every: 100
  save_every: 10000
  eval_every: 5000
  rollout_steps: 4     # multi-step unrolled training (1 = backward compat single-step)
  seq_len: 8           # consecutive transitions per sequence window

data:
  data_dir: data/abides_norm
  num_workers: 4
  pin_memory: true

seed: 42
output_dir: outputs/lewm
